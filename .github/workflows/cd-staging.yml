name: CD - Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Build & Push (staging tag)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push - User Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:staging ./src/user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:staging

      - name: Build & Push - Product Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service:staging ./src/product-service
          docker push ${{ secrets.DOCKER_USERNAME }}/product-service:staging

      - name: Build & Push - Order Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:staging ./src/order-service
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:staging

      - name: Build & Push - Notification Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:staging ./src/notification-service
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:staging

      - name: Deploy to Render (Staging)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Render staging deployment triggered!"

      - name: Deployment Summary
        run: |
          echo "✅ Staging deployment complete!"
          echo "Docker images pushed with :staging tag"
          echo "Live URL: https://shopcloud-q0tw.onrender.com"
