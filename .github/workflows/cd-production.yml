name: CD - Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    name: Build & Push (latest tag)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push - User Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest ./src/user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Build & Push - Product Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest ./src/product-service
          docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest

      - name: Build & Push - Order Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest ./src/order-service
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      - name: Build & Push - Notification Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest ./src/notification-service
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

      - name: Deploy to Render (Production)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Render production deployment triggered!"

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          echo "Manual rollback: docker pull <image>:staging and redeploy"
          exit 1

      - name: Deployment Summary
        run: |
          echo "✅ Production deployment complete!"
          echo "Docker images pushed with :latest tag"
          echo "Live URL: https://devops-cloud-ecommerce.onrender.com"
